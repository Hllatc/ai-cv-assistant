version: "3.9"

services:

  backend:
    build: .
    container_name: ai-cv-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    restart: unless-stopped

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql+psycopg2://cvuser:password@postgres:5432/cvassistant
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    networks:
      - ai-network


  postgres:
    image: postgres:16

    container_name: cvassistant

    environment:
      POSTGRES_USER: cvuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cvassistant

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai-network


  
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network


      
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
    networks:
      - ai-network

volumes:
  postgres_data:
  ollama_data:
  
networks:
  ai-network: